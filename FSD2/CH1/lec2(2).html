<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    const sub={
      "FSD":[
      {"Topic":"HTML","Course":"Beginner","Context":["tags","table","form"]},
      {"Topic":"CSS","Course":"Beginner","Context":["tags","table","form"]},
      ]
    }

    //using for in loop
    for(x in sub.FSD){
      for(y in sub.FSD[x]){
        document.write(sub.FSD[x][y]+"<br>")
      }
    }

    //using for of
    for(x1 of sub.FSD){
      document.write(x1.Topic + "<br>")
      document.write(x1.Course + "<br>")
      document.write(x1.Context + "<br>")
    }

  </script>
</body>
</html>
